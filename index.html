<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WatchList">
  <title>WatchList</title>
  <style>
    /* DESIGN TOKENS */
    :root {
      --bg: #251351;
      --bg-card: linear-gradient(160deg, #3a1f7a, #1e0e4a);
      --accent: #E57A44;
      --accent-dark: #c95e2a;
      --btn-gradient: linear-gradient(135deg, #E57A44, #c95e2a);
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.45);
      --text-dim: rgba(255,255,255,0.3);
      --border: rgba(255,255,255,0.08);
      --border-accent: rgba(229,122,68,0.3);
      --tab-bg: rgba(30,14,74,0.97);
      --sheet-bg: #2a1560;
      --radius-card: 16px;
      --radius-btn: 14px;
      --radius-pill: 20px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
      --tab-height: 60px;
    }

    /* RESET */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* APP SHELL */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding-top: var(--safe-top);
    }

    /* SCREENS */
    .screen {
      display: none;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    .screen.active { display: flex; flex-direction: column; }

    /* TAB BAR */
    #tab-bar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: calc(var(--tab-height) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: var(--tab-bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    .tab-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 3px; flex: 1; cursor: pointer;
      min-height: 44px; justify-content: center;
    }
    .tab-icon { font-size: 22px; opacity: 0.35; transition: opacity 0.15s; }
    .tab-label { font-size: 10px; color: var(--text-dim); font-weight: 500; }
    .tab-item.active .tab-icon { opacity: 1; }
    .tab-item.active .tab-label { color: var(--accent); font-weight: 600; }
    .tab-add-icon {
      width: 46px; height: 46px;
      background: var(--btn-gradient);
      border-radius: 15px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; margin-top: -10px;
      box-shadow: 0 4px 16px rgba(229,122,68,0.45);
    }

    /* SCREEN HEADERS */
    .screen-header { padding: calc(var(--safe-top) + 8px) 20px 12px; flex-shrink: 0; }
    .screen-title {
      font-size: 28px; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #ff9d6c);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .section-label {
      font-size: 12px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--text-muted);
    }

    /* CARDS */
    .entry-card {
      border-radius: var(--radius-card);
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
      transition: border-color 0.15s;
    }
    .entry-card:active { opacity: 0.85; }
    .card-poster {
      width: 100%; aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: linear-gradient(160deg, rgba(229,122,68,0.2), #1e0e4a);
    }
    .card-poster-fallback {
      width: 100%; aspect-ratio: 2/3;
      background: var(--bg-card);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    .card-poster-fade {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(to top, var(--bg), transparent);
      pointer-events: none;
    }
    .card-status-dot {
      position: absolute; top: 8px; right: 8px;
      width: 8px; height: 8px; border-radius: 50%;
    }
    .dot-want { background: var(--accent); }
    .dot-watching { background: #3498db; }
    .dot-watched { background: #2ecc71; }
    .dot-abandoned { background: rgba(255,255,255,0.2); }
    .card-binge-badge {
      position: absolute; top: 7px; left: 7px;
      font-size: 8px; font-weight: 800; letter-spacing: 0.4px;
      background: var(--btn-gradient); color: #fff;
      padding: 2px 6px; border-radius: 6px;
    }
    .card-body { padding: 8px 10px 10px; }
    .card-title { font-size: 11px; font-weight: 700; line-height: 1.25; margin-bottom: 2px; }
    .card-service { font-size: 9px; font-weight: 600; color: var(--accent); }
    .card-meta { font-size: 9px; color: var(--text-muted); margin-top: 1px; }

    /* MINI CARDS (home rows) */
    .mini-card {
      width: 92px; flex-shrink: 0;
      border-radius: 12px; overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .mini-card:active { opacity: 0.8; }
    .mini-poster {
      height: 124px;
      background: var(--bg-card);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      position: relative; overflow: hidden;
    }
    .mini-poster img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .mini-body { padding: 6px 7px 8px; }
    .mini-title { font-size: 9px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mini-sub { font-size: 8px; color: var(--text-muted); margin-top: 1px; }

    /* BUTTONS */
    .btn-primary {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px; border-radius: var(--radius-btn);
      background: var(--btn-gradient); color: #fff;
      font-size: 15px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 16px rgba(229,122,68,0.35);
      min-height: 44px;
    }
    .btn-primary:active { opacity: 0.85; }
    .btn-secondary {
      padding: 13px; border-radius: var(--radius-btn);
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      color: var(--text-muted); font-size: 14px; font-weight: 600;
      cursor: pointer; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-danger {
      padding: 12px; border-radius: 12px;
      border: 1px solid rgba(255,80,80,0.3);
      color: rgba(255,100,100,0.7);
      font-size: 13px; font-weight: 600; cursor: pointer;
      text-align: center; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
    }

    /* PILLS / CHIPS */
    .filter-pill {
      font-size: 11px; font-weight: 600; padding: 8px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      color: var(--text-dim); white-space: nowrap;
      flex-shrink: 0; cursor: pointer; min-height: 44px;
      display: flex; align-items: center;
    }
    .filter-pill.active {
      background: var(--btn-gradient);
      border-color: transparent; color: #fff;
    }
    .status-chip {
      font-size: 10px; font-weight: 700; padding: 6px 10px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      color: var(--text-dim); cursor: pointer; min-height: 44px;
      display: flex; align-items: center;
    }
    .status-chip.active {
      background: rgba(229,122,68,0.15);
      border-color: var(--border-accent); color: var(--accent);
    }
    .mood-pill {
      font-size: 9px; font-weight: 600; padding: 3px 8px;
      border-radius: var(--radius-pill);
      background: rgba(229,122,68,0.12);
      border: 1px solid rgba(229,122,68,0.25);
      color: rgba(229,122,68,0.9);
    }
    .plus-btn {
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--text-muted); cursor: pointer;
      flex-shrink: 0;
    }

    /* INPUTS */
    .text-input {
      width: 100%; padding: 13px 14px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-btn);
      color: var(--text); font-size: 16px;
      outline: none; appearance: none; -webkit-appearance: none;
    }
    .text-input:focus { border-color: rgba(229,122,68,0.6); }
    .text-input::placeholder { color: var(--text-dim); }

    /* EDIT BADGE (frosted glass) */
    .edit-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 20px; height: 20px; border-radius: 6px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 10px; color: rgba(255,255,255,0.35);
      cursor: pointer; flex-shrink: 0;
    }

    /* FILTER ROW */
    .filter-row {
      display: flex; gap: 6px; padding: 0 16px 12px;
      overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
    }
    .filter-row::-webkit-scrollbar { display: none; }

    /* CARD GRID */
    .card-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; padding: 0 16px;
    }

    /* HORIZONTAL SCROLL ROW */
    .h-scroll {
      display: flex; gap: 10px; padding: 0 16px;
      overflow-x: auto; scrollbar-width: none;
    }
    .h-scroll::-webkit-scrollbar { display: none; }

    /* FIELD ROWS (detail sheet) */
    .field-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
      min-height: 44px;
    }
    .field-row:last-child { border-bottom: none; }
    .field-key { font-size: 11px; color: var(--text-muted); font-weight: 500; flex-shrink: 0; }
    .field-val-wrap { display: flex; align-items: center; gap: 6px; justify-content: flex-end; flex: 1; overflow: hidden; }
    .field-val { font-size: 11px; font-weight: 600; color: var(--text); text-align: right; }

    /* STARS */
    .stars { display: flex; gap: 4px; }
    .star { font-size: 20px; cursor: pointer; min-width: 32px; text-align: center; }
    .star.filled { color: var(--accent); }
    .star.empty { color: rgba(255,255,255,0.15); }

    /* DETAIL SHEET HANDLE */
    .sheet-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.2);
      margin: 10px auto 0; flex-shrink: 0;
    }
    .sheet-poster-wrap {
      position: relative; flex-shrink: 0;
      height: 160px; overflow: hidden;
    }
    .sheet-poster-wrap img,
    .sheet-poster-fallback {
      width: 100%; height: 100%; object-fit: cover;
    }
    .sheet-poster-fallback {
      background: var(--bg-card);
      display: flex; align-items: center; justify-content: center;
      font-size: 56px;
    }
    .sheet-poster-fade {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 70px;
      background: linear-gradient(to top, var(--sheet-bg), transparent);
    }
    .sheet-poster-info {
      position: absolute; bottom: 12px; left: 16px; right: 16px;
    }
    .sheet-title { font-size: 20px; font-weight: 800; }
    .sheet-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .sheet-scroll {
      flex: 1; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 16px calc(var(--safe-bottom) + 16px);
    }

    /* LOADING */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(229,122,68,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* TONIGHT CARDS */
    .tonight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px 20px; }
    .tonight-card {
      border-radius: var(--radius-card);
      overflow: hidden; position: relative;
      height: 170px;
      background: var(--bg-card);
      border: 1px solid var(--border-accent);
      cursor: pointer;
    }
    .tonight-card:active { opacity: 0.85; }
    .tonight-card-poster { position: absolute; inset: 0; }
    .tonight-card-poster img { width: 100%; height: 100%; object-fit: cover; }
    .tonight-card-fade {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(37,19,81,0.97) 30%, transparent);
    }
    .tonight-card-content { position: absolute; bottom: 10px; left: 10px; right: 10px; }
    .tonight-type-badge { font-size: 9px; font-weight: 800; color: var(--accent); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 3px; }
    .tonight-title { font-size: 13px; font-weight: 700; line-height: 1.2; }
    .tonight-meta { font-size: 9px; color: var(--text-muted); margin-top: 3px; }

    /* EMPTY STATE */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; padding: 40px 32px; text-align: center;
    }
    .empty-icon { font-size: 48px; opacity: 0.4; }
    .empty-title { font-size: 16px; font-weight: 700; }
    .empty-sub { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

    /* TONIGHT TYPE SELECTOR */
    .tonight-controls {
      display: flex; align-items: center;
      padding: 0 16px 10px; gap: 6px;
    }
    .tonight-label { font-size: 12px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted); flex-shrink: 0; }
    .type-pills { display: flex; gap: 4px; flex: 1; justify-content: center; }
    .type-pill {
      font-size: 10px; font-weight: 600; padding: 5px 10px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      color: var(--text-dim); cursor: pointer;
    }
    .type-pill.active { background: var(--btn-gradient); border-color: transparent; color: #fff; }
    .shuffle-btn { font-size: 20px; cursor: pointer; opacity: 0.6; min-width: 32px; text-align: center; }

    /* iOS tap highlight */
    * { -webkit-tap-highlight-color: transparent; }

    /* Prevent text selection on interactive elements */
    .tab-item, .filter-pill, .type-pill, .btn-primary, .btn-secondary,
    .entry-card, .mini-card, .tonight-card, .status-chip, .plus-btn,
    .edit-badge, .star, .shuffle-btn {
      -webkit-user-select: none; user-select: none;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- SCREENS -->
  <div id="screen-home"     class="screen active" data-screen="home"></div>
  <div id="screen-browse"   class="screen"        data-screen="browse"></div>
  <div id="screen-add"      class="screen"        data-screen="add"></div>
  <div id="screen-search"   class="screen"        data-screen="search"></div>
  <div id="screen-settings" class="screen"        data-screen="settings"></div>

  <!-- DETAIL SHEET (overlays any screen) -->
  <div id="detail-overlay" style="display:none; position:fixed; inset:0; z-index:100;">
    <div id="detail-backdrop" style="position:absolute;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);"></div>
    <div id="detail-sheet" style="position:absolute;bottom:0;left:0;right:0;top:80px;background:var(--sheet-bg);border-radius:24px 24px 0 0;overflow:hidden;display:flex;flex-direction:column;"></div>
  </div>

  <!-- TAB BAR -->
  <nav id="tab-bar">
    <div class="tab-item active" data-tab="home">
      <div class="tab-icon">🏠</div>
      <div class="tab-label">Home</div>
    </div>
    <div class="tab-item" data-tab="browse">
      <div class="tab-icon">🎞️</div>
      <div class="tab-label">Browse</div>
    </div>
    <div class="tab-item" data-tab="add">
      <div class="tab-add-icon">＋</div>
      <div class="tab-label" style="color:var(--text-dim)">Add</div>
    </div>
    <div class="tab-item" data-tab="search">
      <div class="tab-icon">🔍</div>
      <div class="tab-label">Search</div>
    </div>
    <div class="tab-item" data-tab="settings">
      <div class="tab-icon">⚙️</div>
      <div class="tab-label">Settings</div>
    </div>
  </nav>
</div>
<script>
const WatchList = {};

// ─── STORAGE ───────────────────────────────────────────────────────────────
WatchList.Storage = {
  ITEMS_KEY: 'watchlist_items',
  SETTINGS_KEY: 'watchlist_settings',

  getItems() {
    try {
      return JSON.parse(localStorage.getItem(this.ITEMS_KEY) || '[]');
    } catch { return []; }
  },

  setItems(items) {
    try {
      localStorage.setItem(this.ITEMS_KEY, JSON.stringify(items));
    } catch (e) {
      if (e.name === 'QuotaExceededError') {
        if (WatchList.UI?.showToast) {
          WatchList.UI.showToast('Storage full — please export and remove some entries.', 'error');
        } else {
          console.error('WatchList Storage: QuotaExceededError — UI not yet available.');
        }
      }
    }
  },

  getSettings() {
    try {
      return JSON.parse(localStorage.getItem(this.SETTINGS_KEY) || '{}');
    } catch { return {}; }
  },

  setSettings(settings) {
    localStorage.setItem(this.SETTINGS_KEY, JSON.stringify(settings));
  },

  getSetting(key, fallback = null) {
    return this.getSettings()[key] ?? fallback;
  },

  setSetting(key, value) {
    const s = this.getSettings();
    s[key] = value;
    this.setSettings(s);
  },

  generateId() {
    return crypto.randomUUID();
  },

  exportItems() {
    const items = this.getItems();
    const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const date = new Date().toISOString().split('T')[0];
    a.href = url;
    a.download = `watchlist-export-${date}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 100);
    this.setSetting('lastExportDate', new Date().toISOString());
  },

  importItems(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const items = JSON.parse(e.target.result);
          if (!Array.isArray(items)) throw new Error('Invalid format');
          this.setItems(items);
          resolve(items.length);
        } catch {
          reject(new Error('Could not read file. Make sure it is a valid WatchList export.'));
        }
      };
      reader.onerror = () => reject(new Error('Could not read file.'));
      reader.readAsText(file);
    });
  },

  getLastExportRelative() {
    const date = this.getSetting('lastExportDate');
    if (!date) return 'Never backed up';
    const days = Math.floor((Date.now() - new Date(date)) / 86400000);
    if (days === 0) return 'Backed up today';
    if (days === 1) return 'Last backed up yesterday';
    return `Last backed up ${days} days ago`;
  }
};

// ─── ITEMS ─────────────────────────────────────────────────────────────────
WatchList.Items = {
  MOOD_OPTIONS: ['funny', 'intense', 'light', 'feel-good', 'dark', 'suspenseful'],

  add(data) {
    const items = WatchList.Storage.getItems();
    const item = {
      id: WatchList.Storage.generateId(),
      title: data.title || '',
      type: data.type || 'movie',           // 'movie' | 'tv'
      genre: data.genre || [],
      moodTags: data.moodTags || [],
      posterUrl: data.posterUrl || null,
      runtime: data.runtime || null,
      episodeCount: data.episodeCount || null,
      avgEpisodeLength: data.avgEpisodeLength || null,
      streamingServices: data.streamingServices || [],
      releaseYear: data.releaseYear || null,
      releaseDate: data.releaseDate || null,
      cast: data.cast || [],
      director: data.director || null,
      bingeStatus: data.bingeStatus || null,  // 'binge_ready'|'airing'|'between_seasons'|null
      finaleDate: data.finaleDate || null,
      dateAdded: new Date().toISOString().split('T')[0],
      status: 'want',       // always default — user sets this
      rating: null,         // user sets when watched
      priority: 'normal',   // user sets
      currentSeason: data.type === 'tv' ? (data.currentSeason || 1) : null,
    };
    items.unshift(item);    // newest first
    WatchList.Storage.setItems(items);
    return item;
  },

  update(id, changes) {
    const items = WatchList.Storage.getItems();
    const idx = items.findIndex(i => i.id === id);
    if (idx === -1) return null;
    items[idx] = { ...items[idx], ...changes };
    WatchList.Storage.setItems(items);
    return items[idx];
  },

  delete(id) {
    const items = WatchList.Storage.getItems().filter(i => i.id !== id);
    WatchList.Storage.setItems(items);
  },

  getById(id) {
    return WatchList.Storage.getItems().find(i => i.id === id) || null;
  },

  getFiltered(filters = {}) {
    let items = WatchList.Storage.getItems();
    if (filters.type)     items = items.filter(i => i.type === filters.type);
    if (filters.status)   items = items.filter(i => i.status === filters.status);
    if (filters.priority) items = items.filter(i => i.priority === filters.priority);
    if (filters.service)  items = items.filter(i => Array.isArray(i.streamingServices) && i.streamingServices.includes(filters.service));
    if (filters.mood)     items = items.filter(i => Array.isArray(i.moodTags) && i.moodTags.includes(filters.mood));
    if (filters.binge)    items = items.filter(i => i.bingeStatus === 'binge_ready');
    if (filters.query) {
      const q = filters.query.toLowerCase();
      items = items.filter(i => i.title.toLowerCase().includes(q));
    }
    return items;
  },

  getAllServices() {
    const all = WatchList.Storage.getItems().flatMap(i => i.streamingServices);
    return [...new Set(all)].sort();
  },

  getAllMoods() {
    const all = WatchList.Storage.getItems().flatMap(i => i.moodTags);
    return [...new Set(all)].sort();
  },

  getWatchTonightPicks(typeFilter = 'both') {
    // typeFilter: 'both' | 'movie' | 'tv'
    const pool = WatchList.Storage.getItems().filter(i => i.status === 'want');
    const scored = (arr) => arr
      .map(item => ({ item, s: Math.random() + (item.priority === 'high' ? 2 : 0) + (item.bingeStatus === 'binge_ready' ? 1 : 0) }))
      .sort((a, b) => b.s - a.s)
      .map(x => x.item);

    if (typeFilter === 'movie') return scored(pool.filter(i => i.type === 'movie')).slice(0, 2);
    if (typeFilter === 'tv')    return scored(pool.filter(i => i.type === 'tv')).slice(0, 2);
    // 'both'
    const movies = scored(pool.filter(i => i.type === 'movie'));
    const shows  = scored(pool.filter(i => i.type === 'tv'));
    return [movies[0], shows[0]].filter(Boolean);
  }
};

// ─── GEMINI ────────────────────────────────────────────────────────────────
WatchList.Gemini = {
  API_URL: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent',

  buildSearchPrompt(query) {
    return `You are a movie and TV show database assistant. The user wants to add a title to their personal watchlist.

Search the web and find this movie or TV show: "${query}"

Return ONLY a single valid JSON object — no markdown, no explanation, just raw JSON.

Schema:
{
  "title": "exact official title",
  "type": "movie" or "tv",
  "genre": ["Genre1", "Genre2"],
  "posterUrl": "direct URL to a JPEG or PNG poster image",
  "runtime": runtime in minutes for movies (integer or null),
  "episodeCount": total episodes for TV shows (integer or null),
  "avgEpisodeLength": average episode length in minutes for TV shows (integer or null),
  "streamingServices": ["Service1", "Service2"] (US services currently streaming this),
  "releaseYear": year as integer,
  "releaseDate": "YYYY-MM-DD",
  "cast": ["Actor 1", "Actor 2", "Actor 3"] (top 3),
  "director": "Director Name" (null for TV shows),
  "bingeStatus": "binge_ready" or "airing" or "between_seasons" or null (TV shows only; null for movies),
  "finaleDate": "YYYY-MM-DD" or null (only set if bingeStatus is "airing")
}

Rules:
- posterUrl must be a working direct image URL (not a webpage URL)
- streamingServices: only active current US streaming availability
- bingeStatus for TV shows: "binge_ready" means the full current season is out; "airing" means mid-season right now; "between_seasons" means no active season
- Return null for any field you cannot determine with confidence
- Return ONLY the JSON object, nothing else`;
  },

  buildBingePrompt(item) {
    return `Check the current binge/airing status for the TV show "${item.title}" (${item.releaseYear}).

Return ONLY a single valid JSON object:
{
  "bingeStatus": "binge_ready" or "airing" or "between_seasons",
  "finaleDate": "YYYY-MM-DD" or null
}

- "binge_ready": the full current season has been released
- "airing": actively airing right now (finaleDate is the expected finale date of this season)
- "between_seasons": no season currently airing

Return ONLY the JSON object, nothing else.`;
  },

  async call(prompt, apiKey) {
    const res = await fetch(`${this.API_URL}?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: AbortSignal.timeout(30000),
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        tools: [{ google_search: {} }],
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `API error ${res.status}`);
    }
    const data = await res.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
    // Extract first JSON object from the response text
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON found in Gemini response');
    try {
      return JSON.parse(match[0]);
    } catch {
      throw new Error('Failed to parse JSON from Gemini response');
    }
  },

  async searchTitle(query) {
    const apiKey = WatchList.Storage.getSetting('geminiApiKey');
    if (!apiKey) throw new Error('NO_API_KEY');
    return this.call(this.buildSearchPrompt(query), apiKey);
  },

  async refreshBingeStatus(item) {
    const apiKey = WatchList.Storage.getSetting('geminiApiKey');
    if (!apiKey) throw new Error('NO_API_KEY');
    const result = await this.call(this.buildBingePrompt(item), apiKey);
    return WatchList.Items.update(item.id, {
      bingeStatus: result.bingeStatus || null,
      finaleDate: result.finaleDate || null,
    });
  }
};

    } catch (err) {
      const msg = err.message === 'NO_API_KEY'
        ? 'No API key set. Go to Settings and add your Gemini API key first.'
        : (err.message || 'Something went wrong. Please try again.');
      WatchList.UI._showAddError(msg, query);
    }
  },

  _confirmAdd() {
    const data = WatchList.State._pendingAdd;
    if (!data) return;
    const item = WatchList.Items.add(data);
    WatchList.State._pendingAdd = null;
    WatchList.UI._showAddSearch();
    WatchList.UI.openDetail(item);
    WatchList.UI.showToast(`"${item.title}" added!`);
  },

  renderSearch(filters = {}) {
    WatchList.State.searchFilters = filters;
    const el = document.getElementById('screen-search');
    const services = WatchList.Items.getAllServices();
    const moods = WatchList.Items.getAllMoods();
    const pills = [
      { label: 'All',          active: !Object.keys(filters).length, onclick: `WatchList.UI.renderSearch({})` },
      { label: '🎬 Movies',   active: filters.type==='movie',        onclick: `WatchList.UI.renderSearch({type:'movie'})` },
      { label: '📺 Shows',    active: filters.type==='tv',           onclick: `WatchList.UI.renderSearch({type:'tv'})` },
      { label: '⚡ High',     active: filters.priority==='high',     onclick: `WatchList.UI.renderSearch({priority:'high'})` },
      { label: 'Binge Ready', active: !!filters.binge,               onclick: `WatchList.UI.renderSearch({binge:true})` },
      ...services.map(s => ({ label: this._esc(s), active: filters.service===s, onclick: `WatchList.UI.renderSearch({service:${this._esc(JSON.stringify(s))}})` })),
      ...moods.map(m => ({ label: this._esc(m), active: filters.mood===m, onclick: `WatchList.UI.renderSearch({mood:${this._esc(JSON.stringify(m))}})` })),
    ].map(p => `<div class="filter-pill ${p.active?'active':''}" onclick="${p.onclick}">${p.label}</div>`).join('');

    el.innerHTML = `
      <div class="screen-header"><div class="screen-title">Search</div></div>
      <div style="padding:0 16px 10px;">
        <input id="search-input" class="text-input" type="search"
          placeholder="Search your list…" oninput="WatchList.UI._runSearch(this.value)">
      </div>
      <div class="filter-row">${pills}</div>
      <div id="search-results"></div>
    `;
    setTimeout(() => document.getElementById('search-input')?.focus(), 100);
    this._runSearch('');
  },

  _runSearch(query) {
    const container = document.getElementById('search-results');
    if (!container) return;
    const filters = { ...(WatchList.State.searchFilters || {}), ...(query ? { query } : {}) };
    const items = WatchList.Items.getFiltered(filters);
    if (!items.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">${query ? `No results for "${this._esc(query)}"` : 'Nothing in your list yet'}</div></div>`;
      return;
    }
    container.innerHTML = `<div class="card-grid">${items.map(i => this._browseCard(i)).join('')}</div><div style="height:16px;"></div>`;
  },

  renderDetail(item) {
    const sheet = document.getElementById('detail-sheet');
    if (!sheet || !item) return;
    const isTV = item.type === 'tv';
    const statusOptions = [
      { value: 'want',      label: 'Want to Watch' },
      { value: 'watching',  label: 'Watching' },
      { value: 'watched',   label: 'Watched' },
      { value: 'abandoned', label: 'Abandoned' },
    ];

    const posterHTML = item.posterUrl
      ? `<img src="${WatchList.UI._esc(item.posterUrl)}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;" onerror="this.style.display='none'"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:60px;pointer-events:none;">${isTV ? '📺' : '🎬'}</div>`
      : `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:60px;">${isTV ? '📺' : '🎬'}</div>`;

    const statusChips = statusOptions.map(o =>
      `<div class="status-chip ${item.status === o.value ? 'active' : ''}"
        onclick="WatchList.UI._updateDetailField('${item.id}','status','${o.value}')">${o.label}</div>`
    ).join('');

    const moodPills = (item.moodTags || []).map(t =>
      `<span class="mood-pill">${WatchList.UI._esc(t)}</span>`
    ).join('');

    const starsHTML = [1,2,3,4,5].map(n =>
      `<span class="star ${(item.rating || 0) >= n ? 'filled' : 'empty'}"
        onclick="WatchList.UI._updateDetailField('${item.id}','rating',${n})">★</span>`
    ).join('');

    const bingeColor = { binge_ready: '#2ecc71', airing: '#e67e22', between_seasons: '#7f8c8d' };
    const bingeLabel = { binge_ready: 'Binge Ready', airing: 'Airing', between_seasons: 'Between Seasons' };

    const genreDisplay = Array.isArray(item.genre) ? item.genre.join(', ') : (item.genre || '—');
    const serviceDisplay = Array.isArray(item.streamingServices) ? item.streamingServices.join(', ') : (item.streamingServices || '—');
    const runtimeDisplay = isTV
      ? (item.episodeCount ? `${item.episodeCount} eps · ~${item.avgEpisodeLength || '?'}min` : '—')
      : (item.runtime ? `${item.runtime} min` : '—');
    const releaseDisplay = item.releaseDate || String(item.releaseYear || '—');

    sheet.innerHTML = `
      <div class="sheet-handle"></div>
      <div style="position:relative;height:170px;flex-shrink:0;overflow:hidden;background:var(--bg-card);">
        ${posterHTML}
        <div style="position:absolute;inset:0;background:linear-gradient(to top,var(--sheet-bg) 30%,transparent);"></div>
        <div style="position:absolute;bottom:12px;left:16px;right:16px;">
          <div class="sheet-title">${WatchList.UI._esc(item.title)}</div>
          <div class="sheet-sub">${isTV ? 'TV Show' : 'Movie'} · ${WatchList.UI._esc(String(item.releaseYear || ''))}${item.runtime ? ' · ' + WatchList.UI._esc(String(item.runtime)) + ' min' : ''}</div>
        </div>
      </div>

      <div class="sheet-scroll">
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">${statusChips}</div>

        ${item.status === 'watched' ? `
        <div class="field-row">
          <div class="field-key">Rating</div>
          <div class="field-val-wrap"><div class="stars">${starsHTML}</div></div>
        </div>` : ''}

        ${WatchList.UI._editableField(item.id, 'Genre', 'genre', genreDisplay)}
        ${WatchList.UI._editableField(item.id, 'Streaming', 'streamingServices', serviceDisplay)}
        ${WatchList.UI._editableField(item.id, isTV ? 'Episodes' : 'Runtime', isTV ? 'episodeCount' : 'runtime', runtimeDisplay, isTV ? item.episodeCount : item.runtime)}
        ${WatchList.UI._editableField(item.id, 'Release', 'releaseDate', releaseDisplay)}

        <div class="field-row">
          <div class="field-key">Priority</div>
          <div class="field-val-wrap">
            <span class="mood-pill" style="cursor:pointer;${item.priority === 'high' ? 'background:rgba(229,122,68,0.25);border-color:rgba(229,122,68,0.5)' : ''}"
              onclick="WatchList.UI._togglePriority('${item.id}')">
              ${item.priority === 'high' ? '⚡ High' : 'Normal'}
            </span>
          </div>
        </div>

        <div class="field-row" style="align-items:flex-start;padding-top:10px;">
          <div class="field-key" style="padding-top:3px;">Mood / Vibe</div>
          <div class="field-val-wrap" style="flex-wrap:wrap;justify-content:flex-end;gap:4px;">
            ${moodPills}
            <span class="plus-btn" onclick="WatchList.UI._openMoodPicker('${item.id}')">+</span>
          </div>
        </div>

        ${isTV ? `
        <div class="field-row">
          <div class="field-key">Season</div>
          <div class="field-val-wrap" style="gap:10px;">
            <span style="font-size:18px;cursor:pointer;padding:4px 8px;min-width:32px;text-align:center;" onclick="WatchList.UI._changeSeason('${item.id}',-1)">−</span>
            <span style="font-size:13px;font-weight:700;">S${item.currentSeason || 1}</span>
            <span style="font-size:18px;cursor:pointer;padding:4px 8px;min-width:32px;text-align:center;" onclick="WatchList.UI._changeSeason('${item.id}',1)">+</span>
          </div>
        </div>
        <div class="field-row">
          <div class="field-key">Binge Status</div>
          <div class="field-val-wrap">
            ${item.bingeStatus ? `
              <span style="width:7px;height:7px;border-radius:50%;background:${bingeColor[item.bingeStatus]};flex-shrink:0;display:inline-block;"></span>
              <span style="font-size:10px;font-weight:700;color:${bingeColor[item.bingeStatus]}">${bingeLabel[item.bingeStatus]}</span>
              ${item.bingeStatus === 'airing' && item.finaleDate ? `<span style="font-size:9px;color:var(--text-dim)">· finale ${WatchList.UI._esc(item.finaleDate)}</span>` : ''}
            ` : '<span style="font-size:11px;color:var(--text-dim)">Unknown</span>'}
            <span style="font-size:14px;cursor:pointer;opacity:0.5;margin-left:4px;min-width:24px;text-align:center;" onclick="WatchList.UI._refreshBinge('${item.id}')">↺</span>
          </div>
        </div>
        ` : ''}

        <div class="field-row">
          <div class="field-key">Added</div>
          <div class="field-val-wrap"><div class="field-val">${WatchList.UI._esc(item.dateAdded || '')}</div></div>
        </div>

        <div class="btn-danger" style="margin-top:16px;"
          onclick="WatchList.UI._deleteItem('${item.id}')">
          Remove from list
        </div>
      </div>
    `;
  },

  _editableField(itemId, label, field, displayVal, rawVal) {
    const editVal = rawVal !== undefined && rawVal !== null ? rawVal : displayVal;
    return `
      <div class="field-row">
        <div class="field-key">${WatchList.UI._esc(label)}</div>
        <div class="field-val-wrap">
          <div class="field-val" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${WatchList.UI._esc(String(displayVal))}</div>
          <div class="edit-badge" onclick="WatchList.UI._inlineEdit('${itemId}','${field}',${WatchList.UI._esc(JSON.stringify(String(editVal)))})">✎</div>
        </div>
      </div>`;
  },

  _updateDetailField(id, field, value) {
    const updated = WatchList.Items.update(id, { [field]: value });
    if (!updated) return;
    WatchList.State.detailItem = updated;
    WatchList.UI.renderDetail(updated);
  },

  _inlineEdit(id, field, currentVal) {
    const newVal = prompt(`Edit ${field}:`, currentVal);
    if (newVal === null) return;
    const arrayFields = ['genre', 'streamingServices', 'cast'];
    const value = arrayFields.includes(field)
      ? newVal.split(',').map(s => s.trim()).filter(Boolean)
      : (newVal !== '' && !isNaN(newVal) ? Number(newVal) : newVal);
    WatchList.UI._updateDetailField(id, field, value);
  },

  _togglePriority(id) {
    const item = WatchList.Items.getById(id);
    if (!item) return;
    WatchList.UI._updateDetailField(id, 'priority', item.priority === 'high' ? 'normal' : 'high');
  },

  _openMoodPicker(id) {
    const item = WatchList.Items.getById(id);
    if (!item) return;
    if (document.querySelector('.mood-picker-overlay')) return;
    const current = item.moodTags || [];
    const options = WatchList.Items.MOOD_OPTIONS.map(m =>
      `<label style="display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;min-height:44px;">
        <input type="checkbox" ${current.includes(m) ? 'checked' : ''} value="${m}" style="width:18px;height:18px;accent-color:var(--accent);">
        <span style="font-size:14px;">${m}</span>
      </label>`
    ).join('');
    const overlay = document.createElement('div');
    overlay.className = 'mood-picker-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;justify-content:flex-end;';
    overlay.innerHTML = `
      <div style="position:absolute;inset:0;background:rgba(0,0,0,0.6);" onclick="this.parentElement.remove()"></div>
      <div style="position:relative;background:var(--sheet-bg);border-radius:24px 24px 0 0;padding:20px 20px calc(var(--safe-bottom) + 20px);z-index:1;">
        <div style="font-size:16px;font-weight:700;margin-bottom:12px;">Mood / Vibe</div>
        ${options}
        <button class="btn-primary" style="margin-top:16px;" id="mood-done-btn">Done</button>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector('#mood-done-btn').addEventListener('click', () => {
      const tags = Array.from(overlay.querySelectorAll('input[type=checkbox]:checked')).map(c => c.value);
      WatchList.UI._updateDetailField(id, 'moodTags', tags);
      overlay.remove();
    });
  },

  _changeSeason(id, delta) {
    const item = WatchList.Items.getById(id);
    if (!item) return;
    const next = Math.max(1, (item.currentSeason || 1) + delta);
    WatchList.UI._updateDetailField(id, 'currentSeason', next);
  },

  async _refreshBinge(id) {
    const item = WatchList.Items.getById(id);
    if (!item) return;
    WatchList.UI.showToast('Checking binge status…');
    try {
      const updated = await WatchList.Gemini.refreshBingeStatus(item);
      if (!updated) return;
      WatchList.State.detailItem = updated;
      WatchList.UI.renderDetail(updated);
      WatchList.UI.showToast('Binge status updated.');
    } catch (err) {
      WatchList.UI.showToast('Could not refresh: ' + err.message, 'error');
    }
  },

  _deleteItem(id) {
    const item = WatchList.Items.getById(id);
    if (!item) return;
    if (!confirm(`Remove "${item.title}" from your list?`)) return;
    WatchList.Items.delete(id);
    WatchList.UI.closeDetail();
    WatchList.UI.showToast('Removed.');
  },
};

// ─── INIT ──────────────────────────────────────────────────────────────────
WatchList.init = function() {
  // Inject animation keyframes (guarded for idempotency)
  if (!document.getElementById('wl-keyframes')) {
    const style = document.createElement('style');
    style.id = 'wl-keyframes';
    style.textContent = `@keyframes fadeInUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }`;
    document.head.appendChild(style);
  }

  // Wire tab bar
  document.querySelectorAll('.tab-item').forEach(tab => {
    tab.addEventListener('click', () => {
      WatchList.UI.navigate(tab.dataset.tab);
    });
  });

  // Close detail on backdrop tap
  document.getElementById('detail-backdrop').addEventListener('click', () => {
    WatchList.UI.closeDetail();
  });

  WatchList.UI.navigate('home');
};

document.addEventListener('DOMContentLoaded', WatchList.init);
</script>
</body>
</html>
